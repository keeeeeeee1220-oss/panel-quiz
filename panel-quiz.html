<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>パネルクイズ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface-2: #252545;
  --panel-bg: #252545;
  --accent: #ff6b35;
  --accent-glow: rgba(255,107,53,0.4);
  --correct: #00c9a7;
  --incorrect: #ff4757;
  --text: #e8e8f0;
  --text-dim: #8888a8;
  --border: #33334f;
}
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
}
img {
  -webkit-user-drag: none;
  -webkit-touch-callout: none;
  pointer-events: none;
}

.screen { display: none; width: 100%; max-width: 600px; }
.screen.active { display: flex; flex-direction: column; align-items: center; gap: 10px; }

.btn {
  padding: 14px 24px;
  border: none; border-radius: 8px;
  font-size: 16px; font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
  touch-action: manipulation;
  color: inherit;
  font-family: inherit;
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.4; pointer-events: none; }
.btn-primary { background: var(--accent); color: #fff; width: 100%; }

/* ====== TITLE SCREEN ====== */
#title-screen { padding-top: 20px; gap: 14px !important; }
#title-screen .logo-img {
  width: 100%;
  max-width: 400px;
  height: auto;
  display: block;
}
#title-screen .subheading {
  font-size: 14px;
  color: var(--text-dim);
  text-align: center;
}
.name-label { font-size: 12px; color: var(--text-dim); letter-spacing: 0.05em; }
.name-input {
  width: 100%;
  max-width: 320px;
  padding: 14px 16px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 17px;
  text-align: center;
  outline: none;
  -webkit-user-select: text;
  user-select: text;
}
.name-input:focus { border-color: var(--accent); }

/* ====== WAIT SCREEN ====== */
#wait-screen { padding-top: 40px; }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.95); }
}
.wait-title { font-size: 22px; font-weight: 800; text-align: center; }
.wait-subtitle { font-size: 14px; color: var(--text-dim); text-align: center; }
.player-badge {
  background: var(--surface);
  border-radius: 20px;
  padding: 8px 20px;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
}
.player-badge .dot {
  width: 8px; height: 8px;
  background: var(--correct);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
.player-badge .divider { color: var(--text-dim); }
.player-badge .score { color: var(--accent); font-weight: 700; }

/* ====== ENDED SCREEN ====== */
#ended-screen { padding-top: 60px; text-align: center; }
.ended-title { font-size: 28px; font-weight: 900; margin-bottom: 20px; }
.ended-score-box {
  background: var(--surface);
  border-radius: 12px;
  padding: 20px 40px;
  font-size: 14px;
  color: var(--text-dim);
}
.ended-score-box .num {
  font-size: 48px;
  color: var(--accent);
  font-weight: 900;
  display: block;
  margin: 4px 0;
}

/* ====== QUIZ SCREEN ====== */
#quiz-screen { gap: 6px !important; }

.quiz-header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2px;
  gap: 8px;
}
.q-label { font-size: 18px; font-weight: 800; }
.score-badge {
  background: var(--surface);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 13px;
  color: var(--text-dim);
}
.score-badge .num {
  color: var(--accent);
  font-weight: 800;
  font-size: 16px;
  margin-right: 2px;
}
.review-btn-small {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 10px;
  border-radius: 16px;
  font-size: 14px;
  cursor: pointer;
  touch-action: manipulation;
}
.review-btn-small:active { transform: scale(0.94); }

/* Turn indicator */
.turn-indicator {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 2px 0;
}
.turn-step {
  flex: 1;
  padding: 5px 2px;
  background: var(--surface);
  color: var(--text-dim);
  font-size: 10px;
  text-align: center;
  border-radius: 5px;
  transition: all 0.3s;
  white-space: nowrap;
  min-width: 0;
}
.turn-step.done {
  background: rgba(0,201,167,0.15);
  color: var(--correct);
}
.turn-step.active {
  background: var(--accent);
  color: #fff;
  font-weight: 700;
}
.turn-arrow { color: var(--text-dim); font-size: 9px; flex-shrink: 0; }

/* Board */
.quiz-board {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  background: var(--panel-bg);
  overflow: hidden;
}
.question-bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
.panel-grid {
  position: absolute; inset: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 1fr);
}
.panel-cell {
  position: relative;
  background-color: var(--panel-bg);
  background-repeat: no-repeat;
  background-size: 400% 400%;
  border: 1px solid rgba(255,255,255,0.06);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.panel-cell.selectable { cursor: pointer; }
.panel-cell.selectable:active { filter: brightness(1.25); }
.panel-cell.selected {
  box-shadow: inset 0 0 0 4px var(--accent), 0 0 12px var(--accent-glow);
  z-index: 1;
}
.panel-cell.selected::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,107,53,0.18);
  pointer-events: none;
}
.panel-cell.opened {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.85);
}

/* Info + Action */
.quiz-info {
  font-size: 13px;
  color: var(--text-dim);
  text-align: center;
  min-height: 18px;
  padding: 2px 0;
}
.quiz-action { width: 100%; }

.answer-form { display: flex; gap: 6px; width: 100%; }
.answer-input {
  flex: 1;
  min-width: 0;
  padding: 12px 14px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  text-align: center;
  outline: none;
  -webkit-user-select: text;
  user-select: text;
}
.answer-input:focus { border-color: var(--accent); }
.answer-submit {
  padding: 12px 18px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
  touch-action: manipulation;
}
.answer-submit:active { transform: scale(0.96); }
.answer-submit:disabled { opacity: 0.5; }

.result-banner {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  text-align: center;
  font-size: 20px;
  font-weight: 800;
}
.result-banner.correct { background: rgba(0,201,167,0.15); color: var(--correct); }
.result-banner.incorrect { background: rgba(255,71,87,0.15); color: var(--incorrect); }

.wait-inline {
  padding: 12px 14px;
  background: linear-gradient(135deg, var(--surface), var(--surface-2));
  border: 1px dashed var(--border);
  border-radius: 8px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
}
.wait-inline .msg {
  color: var(--text);
  font-weight: 700;
  font-size: 14px;
  margin-top: 4px;
}

/* ====== MODALS ====== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.active { display: flex; }

.modal-box {
  background: var(--surface);
  border-radius: 12px;
  padding: 24px;
  max-width: 340px;
  width: 100%;
  text-align: center;
  border: 1px solid var(--border);
}
.modal-title {
  font-size: 17px;
  font-weight: 800;
  margin-bottom: 8px;
}
.modal-msg {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 20px;
}
.modal-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.modal-btn {
  padding: 12px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
}
.modal-btn:active { transform: scale(0.96); }
.modal-btn-cancel { background: var(--surface-2); color: var(--text); }
.modal-btn-ok { background: var(--accent); color: #fff; }

/* Review Modal */
.review-modal-content {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  max-width: 500px;
  width: 100%;
  max-height: 92vh;
  border-radius: 12px;
  padding: 12px;
  gap: 10px;
  border: 1px solid var(--border);
}
.review-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.review-title { font-size: 16px; font-weight: 700; }
.review-close {
  background: var(--surface);
  border: none;
  color: var(--text);
  width: 32px; height: 32px;
  border-radius: 16px;
  font-size: 16px;
  cursor: pointer;
  touch-action: manipulation;
}
.review-image {
  width: 100%;
  aspect-ratio: 1 / 1;
  background-size: cover;
  background-position: center;
  background-color: var(--surface);
}
.review-answer {
  background: var(--surface);
  border-radius: 8px;
  padding: 10px 14px;
  text-align: center;
}
.review-answer-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; }
.review-answer-text {
  font-size: 22px;
  font-weight: 800;
  color: var(--correct);
  margin-top: 4px;
  -webkit-user-select: text;
  user-select: text;
}
.review-nav {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.review-nav button {
  padding: 12px;
  background: var(--surface);
  border: none;
  color: var(--text);
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  touch-action: manipulation;
}
.review-nav button:active { transform: scale(0.97); }
.review-nav button:disabled { opacity: 0.3; }

/* Info Modal */
.info-modal-content {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  max-width: 400px;
  width: 100%;
  border-radius: 12px;
  padding: 16px;
  gap: 12px;
  border: 1px solid var(--border);
}
.info-block {
  background: var(--surface);
  border-radius: 8px;
  padding: 12px 14px;
}
.info-block-label {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.info-block-content {
  font-size: 15px;
  line-height: 1.8;
}
.info-block-content b {
  color: var(--accent);
  font-weight: 800;
}
</style>
</head>
<body>

<!-- タイトル -->
<div id="title-screen" class="screen active">
  <img class="logo-img" src="images/logo.png" alt="パネルクイズ">
  <span class="name-label">プレイヤー名</span>
  <input class="name-input" id="player-name" type="text" placeholder="名前を入力" maxlength="20">
  <button class="btn btn-primary" onclick="join()">参加する</button>
</div>

<!-- 待機 -->
<div id="wait-screen" class="screen">
  <p class="wait-title" id="wait-title">MCの合図を待っています</p>
  <div class="player-badge">
    <span class="dot"></span>
    <span id="wait-player-name"></span>
    <span class="divider">|</span>
    <span class="score"><span id="wait-score">0</span>点</span>
  </div>
</div>

<!-- 終了 -->
<div id="ended-screen" class="screen">
  <div class="ended-title">ゲーム終了</div>
  <div class="ended-score-box">
    あなたの得点
    <span class="num" id="ended-score-num">0</span>
    点
  </div>
</div>

<!-- クイズ -->
<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <span class="q-label" id="q-label">Q1</span>
    <span class="score-badge"><span class="num" id="score-num">0</span>点</span>
    <button class="review-btn-small" onclick="openInfo()">ルール</button>
    <button class="review-btn-small" id="quiz-review-btn" onclick="openReview()">前の問題</button>
  </div>
  <div class="turn-indicator" id="turn-indicator"></div>
  <div class="quiz-board">
    <div class="question-bg" id="question-bg"></div>
    <div class="panel-grid" id="panel-grid"></div>
  </div>
  <div class="quiz-info" id="quiz-info"></div>
  <div class="quiz-action" id="quiz-action"></div>
</div>

<!-- 確認モーダル -->
<div id="confirm-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">パネルを選択していません</div>
    <div class="modal-msg">よろしいですか？</div>
    <div class="modal-buttons">
      <button class="modal-btn modal-btn-cancel" onclick="cancelConfirm()">キャンセル</button>
      <button class="modal-btn modal-btn-ok" onclick="acceptConfirm()">OK</button>
    </div>
  </div>
</div>

<!-- 見返しモーダル -->
<div id="review-modal" class="modal-overlay">
  <div class="review-modal-content">
    <div class="review-header">
      <span class="review-title" id="review-title">例題</span>
      <button class="review-close" onclick="closeReview()">✕</button>
    </div>
    <div class="review-image" id="review-image"></div>
    <div class="review-answer">
      <div class="review-answer-label">正解</div>
      <div class="review-answer-text" id="review-answer-text"></div>
    </div>
    <div class="review-nav">
      <button id="review-prev" onclick="reviewPrev()">◀ 前の問題</button>
      <button id="review-next" onclick="reviewNext()">次の問題 ▶</button>
    </div>
  </div>
</div>

<!-- ルールモーダル -->
<div id="info-modal" class="modal-overlay">
  <div class="info-modal-content">
    <div class="review-header">
      <span class="review-title">ゲームルール</span>
      <button class="review-close" onclick="closeInfo()">✕</button>
    </div>
    <div class="info-block">
      <div class="info-block-label">パネルの重要度</div>
      <div class="info-block-content">
        🔴 赤 &gt; 🟡 黄 &gt; 🟢 緑 &gt; 🔵 青
      </div>
    </div>
    <div class="info-block">
      <div class="info-block-label">点数計算</div>
      <div class="info-block-content">
        1stラウンドで正解：<b>10点</b><br>
        2ndラウンドで正解：<b>6点</b><br>
        開けなかったパネル：<b>+1点</b> / 枚
      </div>
    </div>
  </div>
</div>

<script src="questions.js?v=3"></script>
<script>
// =============================================================
//   ★ GAS のデプロイURL を貼ってください ★
// =============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw90vq_cB9x0zgRSwvBL9jBihemOieY8dJVDRpQwFqX6V32gdF-4qQsw5PqxmNsKKGkgw/exec';
const POLL_INTERVAL = 3000;

const MAX_Q = 5;
const QUESTION_LABELS = ['例題', '第1問', '第2問', '第3問', '第4問', '第5問'];

// =============================================================
//   状態
// =============================================================
const state = {
  playerId: '',
  playerName: '',
  mcState: { currentQuestion: -1, currentPhase: 'waiting', finalBonus: 0 },
  myQuestions: {},
  totalScore: 0,
  finalBonus: 0,  // このプレイヤーが受け取るボーナス（0=対象外）

  // クライアント側の一時状態
  selectedPanels: new Set(),
  answerPhase: 'select', // 'select' | 'answer'
  lastRenderedQ: -999,

  reviewIndex: 0
};

// サーバー確定前の解答を保護（poll による上書きを防ぐ）
const pendingSubmissions = {};

// =============================================================
//   ユーティリティ
// =============================================================
function getPlayerId() {
  let id = localStorage.getItem('pq_pid');
  if (!id) {
    id = 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('pq_pid', id);
  }
  return id;
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function normalizeText(text) {
  let s = String(text).trim().toLowerCase();
  s = s.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  s = s.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
  s = s.replace(/[\s　・\-_=＝]/g, '');
  return s;
}
function checkAnswer(input, answers) {
  const norm = normalizeText(input);
  return answers.some(a => normalizeText(a) === norm);
}

// =============================================================
//   通信
// =============================================================
function jsonpFetch(url) {
  return new Promise((resolve, reject) => {
    if (!GAS_URL) { reject(new Error('GAS_URL未設定')); return; }
    const cb = 'cb_' + Math.random().toString(36).slice(2, 10);
    const cleanup = () => { delete window[cb]; s.remove(); };
    window[cb] = data => { resolve(data); cleanup(); };
    const s = document.createElement('script');
    s.onerror = () => { reject(new Error('通信失敗')); cleanup(); };
    s.src = url + (url.indexOf('?') > -1 ? '&' : '?') + 'callback=' + cb + '&t=' + Date.now();
    document.body.appendChild(s);
    setTimeout(() => { if (window[cb]) { reject(new Error('timeout')); cleanup(); } }, 20000);
  });
}
async function postJSON(payload) {
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
  } catch(e) {}
}

// =============================================================
//   参加
// =============================================================
async function join() {
  const name = document.getElementById('player-name').value.trim();
  if (!name) {
    const input = document.getElementById('player-name');
    input.focus();
    input.style.borderColor = 'var(--incorrect)';
    return;
  }
  state.playerName = name;
  state.playerId = getPlayerId();
  localStorage.setItem('pq_name', name);
  document.getElementById('wait-player-name').textContent = name;

  await postJSON({ type: 'join', playerId: state.playerId, name });
  showScreen('wait-screen');
  poll();
  preloadAllImages();
}

// 全問題の画像を事前ダウンロード（遷移時のラグ防止）
function preloadAllImages() {
  const urls = new Set();
  if (window.QUESTIONS) {
    window.QUESTIONS.forEach(q => {
      if (q && q.image) urls.add(q.image);
      if (q && q.panel) urls.add(q.panel);
    });
  }
  urls.forEach(url => {
    const img = new Image();
    img.src = url;
  });
}

// 保存済み名前を復元
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('pq_name');
  if (saved) document.getElementById('player-name').value = saved;
});

// =============================================================
//   ポーリング
// =============================================================
let _polling = false;
async function poll() {
  if (!state.playerId) return;
  if (_polling) return; // 前のリクエストが終わってなければスキップ
  _polling = true;
  try {
    const data = await jsonpFetch(GAS_URL + '?action=my&playerId=' + encodeURIComponent(state.playerId));
    if (data.error) throw new Error(data.error);
    state.mcState = data.state;

    const serverQuestions = data.questions || {};
    // 送信済みだがサーバー確定前の解答を保護
    for (const qKey of Object.keys(pendingSubmissions)) {
      const p = pendingSubmissions[qKey];
      if (p.first) {
        if (!serverQuestions[qKey] || !serverQuestions[qKey].first) {
          if (!serverQuestions[qKey]) serverQuestions[qKey] = {};
          serverQuestions[qKey].first = p.first;
        } else {
          delete p.first;
        }
      }
      if (p.second) {
        if (!serverQuestions[qKey] || !serverQuestions[qKey].second) {
          if (!serverQuestions[qKey]) serverQuestions[qKey] = {};
          serverQuestions[qKey].second = p.second;
        } else {
          delete p.second;
        }
      }
      if (!p.first && !p.second) delete pendingSubmissions[qKey];
    }

    state.myQuestions = serverQuestions;
    state.finalBonus = data.finalBonus || 0;
    render();
  } catch (e) { /* silent */ }
  finally { _polling = false; }
}

// =============================================================
//   ビュー判定
// =============================================================
function determineView() {
  const q = state.mcState.currentQuestion;
  const phase = state.mcState.currentPhase;

  if (q === -1) return { screen: 'wait', title: 'MCの合図を待っています' };
  if (q === 99) return { screen: 'ended' };

  const qData = state.myQuestions[q] || {};
  const first = qData.first;
  const second = qData.second;

  if (phase === 'waiting') {
    return { screen: 'wait', title: '次の問題が始まります' };
  }
  if (phase === '1st') {
    if (first) return { screen: 'quiz', mode: 'submitted_1st' };
    return { screen: 'quiz', mode: 'playing_1st' };
  }
  if (phase === '1st_result') {
    return { screen: 'quiz', mode: 'result_1st' };
  }
  if (phase === '2nd') {
    if (first && first.correct) return { screen: 'quiz', mode: 'wait_2nd_correct1st' };
    if (second) return { screen: 'quiz', mode: 'submitted_2nd' };
    return { screen: 'quiz', mode: 'playing_2nd' };
  }
  if (phase === '2nd_result') {
    return { screen: 'quiz', mode: 'result_2nd' };
  }
  if (phase === 'final') return { screen: 'ended' };

  return { screen: 'wait', title: '接続中' };
}

// =============================================================
//   表示用の得点計算（結果発表フェーズに応じて段階的に公開）
// =============================================================
function calculateRevealedScore() {
  const q = state.mcState.currentQuestion;
  const phase = state.mcState.currentPhase;
  const questions = state.myQuestions;
  let total = 0;

  // ゲーム終了：全部公開（ボーナス含む）
  if (q === 99) {
    for (const qi in questions) {
      total += questions[qi].score || 0;
    }
    total += state.finalBonus || 0;
    return total;
  }
  if (q === -1) return 0;

  // 過去の問題は全部公開
  for (let qi = 0; qi < q; qi++) {
    if (questions[qi]) total += questions[qi].score || 0;
  }

  // 現在の問題はフェーズで判断
  const qData = questions[q];
  if (qData) {
    if (phase === '2nd_result') {
      // 2nd結果発表：全員に公開
      total += qData.score || 0;
      // 最終問題なら、ボーナスもここで公開
      if (q === 5) total += state.finalBonus || 0;
    } else if (phase === '1st_result' || phase === '2nd') {
      // 1st結果発表以降：1st正解者だけ公開
      if (qData.first && qData.first.correct) {
        total += qData.score || 0;
      }
    }
  }
  return total;
}

// =============================================================
//   レンダリング
// =============================================================
function render() {
  // 入力欄の状態を保存（poll再描画で消えないよう）
  const inp = document.getElementById('answer-input');
  const savedValue = inp ? inp.value : null;
  const wasFocused = document.activeElement && document.activeElement.id === 'answer-input';
  const cursorPos = inp && wasFocused ? inp.selectionStart : null;

  const revealedScore = calculateRevealedScore();
  document.getElementById('wait-score').textContent = revealedScore;
  document.getElementById('ended-score-num').textContent = revealedScore;
  document.getElementById('score-num').textContent = revealedScore;

  const view = determineView();
  if (view.screen === 'wait') {
    showScreen('wait-screen');
    document.getElementById('wait-title').textContent = view.title;
    document.getElementById('wait-player-name').textContent = state.playerName;
    return;
  }
  if (view.screen === 'ended') {
    showScreen('ended-screen');
    return;
  }
  showScreen('quiz-screen');
  renderQuiz(view.mode);

  // 入力欄の状態を復元
  const newInp = document.getElementById('answer-input');
  if (newInp && savedValue !== null) {
    newInp.value = savedValue;
    if (wasFocused) {
      newInp.focus();
      if (cursorPos !== null) {
        try { newInp.setSelectionRange(cursorPos, cursorPos); } catch(e) {}
      }
    }
  }
}

function renderQuiz(mode) {
  const q = state.mcState.currentQuestion;
  const qDef = window.QUESTIONS[q];
  if (!qDef) return;

  // 問題が変わったら選択リセット
  if (state.lastRenderedQ !== q) {
    state.lastRenderedQ = q;
    state.selectedPanels = new Set();
    state.answerPhase = 'select';
  }

  document.getElementById('q-label').textContent = QUESTION_LABELS[q];
  document.getElementById('quiz-review-btn').style.display = q > 0 ? '' : 'none';
  document.getElementById('question-bg').style.backgroundImage = `url('${qDef.image}')`;

  renderPanels(qDef, mode);
  renderTurnIndicator(mode);
  renderInfoAndAction(mode);
}

function renderPanels(qDef, mode) {
  const grid = document.getElementById('panel-grid');
  grid.innerHTML = '';

  const q = state.mcState.currentQuestion;
  const qData = state.myQuestions[q] || {};

  // 開放済みパネル
  const opened = new Set();
  if (qData.first) qData.first.panels.forEach(p => opened.add(p));
  if (qData.second) qData.second.panels.forEach(p => opened.add(p));

  // 解答フェーズ中は、選択したパネルも開放扱いにして画像を見せる
  if (state.answerPhase === 'answer' && (mode === 'playing_1st' || mode === 'playing_2nd')) {
    state.selectedPanels.forEach(p => opened.add(p));
  }

  const isSelectable = (mode === 'playing_1st' || mode === 'playing_2nd') && state.answerPhase === 'select';

  for (let i = 0; i < 16; i++) {
    const cell = document.createElement('div');
    cell.className = 'panel-cell';
    cell.dataset.index = i;
    const row = Math.floor(i / 4), col = i % 4;
    if (qDef.panel) {
      cell.style.backgroundImage = `url('${qDef.panel}')`;
      cell.style.backgroundPosition = `${col * (100/3)}% ${row * (100/3)}%`;
    }
    if (opened.has(i)) {
      cell.classList.add('opened');
    } else if (isSelectable) {
      cell.classList.add('selectable');
      if (state.selectedPanels.has(i)) cell.classList.add('selected');
      cell.addEventListener('click', () => togglePanel(i));
    }
    grid.appendChild(cell);
  }
}

function togglePanel(idx) {
  const q = state.mcState.currentQuestion;
  const qData = state.myQuestions[q] || {};
  const openedByFirst = (qData.first && qData.first.panels) || [];
  if (openedByFirst.indexOf(idx) !== -1) return;
  if (state.selectedPanels.has(idx)) state.selectedPanels.delete(idx);
  else state.selectedPanels.add(idx);
  render();
}

function renderTurnIndicator(mode) {
  const el = document.getElementById('turn-indicator');
  const steps = ['1st選択', '解答', '2nd選択', '解答'];
  let current = 0;
  if (mode === 'playing_1st') current = state.answerPhase === 'answer' ? 1 : 0;
  else if (mode === 'submitted_1st') current = 1;
  else if (mode === 'result_1st') current = 1;
  else if (mode === 'playing_2nd') current = state.answerPhase === 'answer' ? 3 : 2;
  else if (mode === 'submitted_2nd' || mode === 'wait_2nd_correct1st') current = 3;
  else if (mode === 'result_2nd') current = 3;

  let html = '';
  steps.forEach((label, i) => {
    if (i > 0) html += '<span class="turn-arrow">→</span>';
    let cls = 'turn-step';
    if (i < current) cls += ' done';
    if (i === current) cls += ' active';
    html += `<div class="${cls}">${label}</div>`;
  });
  el.innerHTML = html;
}

function renderInfoAndAction(mode) {
  const infoEl = document.getElementById('quiz-info');
  const actionEl = document.getElementById('quiz-action');
  const q = state.mcState.currentQuestion;
  const qData = state.myQuestions[q] || {};
  const first = qData.first;
  const second = qData.second;

  if (mode === 'playing_1st' || mode === 'playing_2nd') {
    const isFirst = mode === 'playing_1st';

    if (state.answerPhase === 'select') {
      const count = state.selectedPanels.size;
      const openedFirst = (first && first.panels.length) || 0;
      if (isFirst) {
        infoEl.textContent = `選択中: ${count}枚`;
      } else if (openedFirst >= 16) {
        infoEl.textContent = `全パネル開放済み`;
      } else {
        infoEl.textContent = `開放済: ${openedFirst}枚 ＋ 追加: ${count}枚`;
      }
      let disabled = false;
      let label = '解答';
      // 2ndで0枚は原則禁止だが、1stで既に16枚全部開けていた場合は例外的に許可
      if (!isFirst && count === 0 && openedFirst < 16) {
        disabled = true;
        label = '追加パネルを選んでください';
      }
      actionEl.innerHTML = `<button class="btn btn-primary" onclick="onAnswerButtonClick()" ${disabled ? 'disabled' : ''}>${label}</button>`;
    } else {
      infoEl.textContent = '答えを入力してください';
      actionEl.innerHTML = `
        <div class="answer-form">
          <input class="answer-input" id="answer-input" type="text" placeholder="解答" autocomplete="off">
          <button class="answer-submit" onclick="submitAnswer()">送信</button>
        </div>
      `;
      const inp = document.getElementById('answer-input');
      setTimeout(() => inp.focus(), 80);
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') submitAnswer();
      });
    }
    return;
  }

  if (mode === 'submitted_1st') {
    infoEl.textContent = `開放: ${(first && first.panels.length) || 0}枚`;
    actionEl.innerHTML = `<div class="wait-inline">解答済み<div class="msg">他の人を待っています...</div></div>`;
    return;
  }

  if (mode === 'result_1st') {
    infoEl.textContent = `開放: ${(first && first.panels.length) || 0}枚`;
    if (first && first.correct) {
      actionEl.innerHTML = `<div class="result-banner correct">1st 正解</div>`;
    } else if (first) {
      actionEl.innerHTML = `<div class="result-banner incorrect">1st 不正解</div>`;
    } else {
      actionEl.innerHTML = `<div class="result-banner incorrect">未解答</div>`;
    }
    return;
  }

  if (mode === 'wait_2nd_correct1st') {
    infoEl.textContent = `開放: ${(first && first.panels.length) || 0}枚`;
    actionEl.innerHTML = `<div class="wait-inline">1stで正解しました<div class="msg">他の人が解答中です...</div></div>`;
    return;
  }

  if (mode === 'submitted_2nd') {
    const total = ((first && first.panels.length) || 0) + ((second && second.panels.length) || 0);
    infoEl.textContent = `開放: ${total}枚`;
    actionEl.innerHTML = `<div class="wait-inline">解答済み<div class="msg">他の人を待っています...</div></div>`;
    return;
  }

  if (mode === 'result_2nd') {
    const total = ((first && first.panels.length) || 0) + ((second && second.panels.length) || 0);
    infoEl.textContent = `開放: ${total}枚`;
    if (first && first.correct) {
      actionEl.innerHTML = `<div class="result-banner correct">1st 正解</div>`;
    } else if (second && second.correct) {
      actionEl.innerHTML = `<div class="result-banner correct">2nd 正解</div>`;
    } else {
      actionEl.innerHTML = `<div class="result-banner incorrect">不正解</div>`;
    }
    return;
  }

  infoEl.textContent = '';
  actionEl.innerHTML = '';
}

// =============================================================
//   解答フロー
// =============================================================
function onAnswerButtonClick() {
  const view = determineView();
  const isFirst = view.mode === 'playing_1st';
  if (state.selectedPanels.size === 0 && isFirst) {
    document.getElementById('confirm-modal').classList.add('active');
    return;
  }
  state.answerPhase = 'answer';
  render();
}
function cancelConfirm() {
  document.getElementById('confirm-modal').classList.remove('active');
}
function acceptConfirm() {
  document.getElementById('confirm-modal').classList.remove('active');
  state.answerPhase = 'answer';
  render();
}

async function submitAnswer() {
  const inp = document.getElementById('answer-input');
  if (!inp) return;
  const answer = inp.value.trim();
  if (!answer) { inp.focus(); return; }

  const btn = document.querySelector('.answer-submit');
  if (btn) btn.disabled = true;

  const q = state.mcState.currentQuestion;
  const qDef = window.QUESTIONS[q];
  const view = determineView();
  const round = view.mode === 'playing_1st' ? 1 : 2;
  const isCorrect = checkAnswer(answer, qDef.answers);
  const panelsArray = Array.from(state.selectedPanels).sort((a,b) => a-b);
  const answerObj = { panels: panelsArray, answer, correct: isCorrect };

  // 未確定として記録（次のpollで消えないよう保護）
  if (!pendingSubmissions[q]) pendingSubmissions[q] = {};
  if (round === 1) pendingSubmissions[q].first = answerObj;
  else pendingSubmissions[q].second = answerObj;

  // 表示用にも即反映
  if (!state.myQuestions[q]) state.myQuestions[q] = {};
  if (round === 1) state.myQuestions[q].first = answerObj;
  else state.myQuestions[q].second = answerObj;

  state.selectedPanels = new Set();
  state.answerPhase = 'select';
  render();

  await postJSON({
    type: 'answer',
    playerId: state.playerId,
    playerName: state.playerName,
    questionIndex: q,
    round,
    panels: panelsArray,
    answer,
    correct: isCorrect
  });

  setTimeout(poll, 600);
}

// =============================================================
//   前の問題を見返す
// =============================================================
function openReview() {
  const q = state.mcState.currentQuestion;
  let maxViewable;
  if (q === -1) { return; } // 未開始は不可
  if (q === 99) { maxViewable = MAX_Q; }
  else if (q === 0) { return; } // 例題中は不可
  else { maxViewable = q - 1; }

  state.reviewIndex = maxViewable; // 一番新しい既プレイ問題から
  updateReview();
  document.getElementById('review-modal').classList.add('active');
}
function closeReview() {
  document.getElementById('review-modal').classList.remove('active');
}
function updateReview() {
  const q = state.mcState.currentQuestion;
  let maxViewable = (q === 99) ? MAX_Q : q - 1;
  if (state.reviewIndex < 0) state.reviewIndex = 0;
  if (state.reviewIndex > maxViewable) state.reviewIndex = maxViewable;

  const qDef = window.QUESTIONS[state.reviewIndex];
  if (!qDef) return;
  document.getElementById('review-title').textContent = QUESTION_LABELS[state.reviewIndex];
  document.getElementById('review-image').style.backgroundImage = `url('${qDef.image}')`;
  document.getElementById('review-answer-text').textContent = qDef.answers[0];
  document.getElementById('review-prev').disabled = state.reviewIndex <= 0;
  document.getElementById('review-next').disabled = state.reviewIndex >= maxViewable;
}
function reviewPrev() { state.reviewIndex--; updateReview(); }
function reviewNext() { state.reviewIndex++; updateReview(); }

// =============================================================
//   ルールモーダル
// =============================================================
function openInfo() {
  document.getElementById('info-modal').classList.add('active');
}
function closeInfo() {
  document.getElementById('info-modal').classList.remove('active');
}

// =============================================================
//   画像保護
// =============================================================
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());

// =============================================================
//   起動
// =============================================================
poll();
setInterval(poll, POLL_INTERVAL);

// タブがバックグラウンドから復帰したら即ポーリング（スマホロック解除等）
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) poll();
});
</script>
